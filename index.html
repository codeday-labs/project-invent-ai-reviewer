<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Reviewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141311;
    --bg-panel:#1C1B18;
    --line:#33312C;
    --cream:#F4F0EA;
    --cream-dim:#A9A499;
    --clay:#D97757;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background:var(--bg);
    color:var(--cream);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:56px 24px 80px;
  }

  header{
    max-width:640px;
    width:100%;
    text-align:left;
    margin-bottom:40px;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--clay);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:14px;
  }
  .eyebrow::before{
    content:"";
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--clay);
    display:inline-block;
  }

  h1{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size:clamp(34px, 5vw, 48px);
    line-height:1.08;
    margin:0 0 14px;
    letter-spacing:-0.01em;
    color:var(--cream);
  }
  h1 em{
    font-style:italic;
    font-weight:400;
    color:var(--clay);
  }

  header p{
    font-size:16px;
    line-height:1.55;
    color:var(--cream-dim);
    max-width:52ch;
    margin:0;
  }

  main{
    width:100%;
    max-width:640px;
  }

  .slide-frame{
    position:relative;
    background:var(--bg-panel);
    border-radius:6px;
    box-shadow:0 18px 40px -18px rgba(0,0,0,0.6);
    aspect-ratio:16/9;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:32px;
    border:1.5px dashed var(--line);
    transition:border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    cursor:pointer;
  }
  .slide-frame:hover, .slide-frame.drag-active{
    border-color:var(--clay);
    transform:translateY(-2px);
    box-shadow:0 22px 44px -16px rgba(0,0,0,0.7);
  }

  .slide-frame .corner-stamp{
    position:absolute;
    top:-14px;
    right:-14px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:var(--clay);
    color:var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    font-weight:500;
    letter-spacing:0.02em;
    transform:rotate(8deg);
    box-shadow:0 6px 14px -4px rgba(217,119,87,0.5);
    line-height:1.2;
    text-align:center;
  }

  .slide-frame .icon{
    width:44px;
    height:44px;
    margin-bottom:14px;
    color:var(--cream-dim);
  }

  .slide-frame .primary-copy{
    font-family:'Fraunces', serif;
    font-size:20px;
    font-weight:600;
    margin:0 0 6px;
    color:var(--cream);
  }
  .slide-frame .secondary-copy{
    font-size:13.5px;
    color:var(--cream-dim);
    margin:0;
  }
  .slide-frame .secondary-copy .filename{
    color:var(--clay);
    font-family:'JetBrains Mono', monospace;
    font-weight:500;
  }

  input[type="file"]{ display:none; }

  .filetypes{
    display:flex;
    gap:8px;
    margin-top:18px;
  }
  .filetypes span{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--cream-dim);
    border:1px solid var(--line);
    border-radius:4px;
    padding:3px 8px;
    background:var(--bg);
  }

  .controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-top:22px;
  }

  .file-status{
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    color:var(--cream-dim);
    flex:1;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  button#uploadBtn{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:14.5px;
    color:var(--bg);
    background:var(--clay);
    border:none;
    border-radius:5px;
    padding:13px 26px;
    cursor:pointer;
    transition:background 0.15s ease, transform 0.1s ease;
    white-space:nowrap;
    flex-shrink:0;
  }
  button#uploadBtn:hover{ background:#E38B6C; }
  button#uploadBtn:active{ transform:scale(0.97); }
  button#uploadBtn:focus-visible{
    outline:2px solid var(--clay);
    outline-offset:2px;
  }

  #loading{
    margin-top:18px;
    font-family:'Inter', sans-serif;
    font-size:14.5px;
    line-height:1.5;
    color:var(--cream-dim);
    display:none;
    align-items:center;
    gap:10px;
  }
  #loading.active{
    display:inline-flex;
  }
  #loading .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--clay);
    animation:blink 1.2s infinite ease-in-out;
  }
  #loading .dot:nth-child(2){ animation-delay:0.2s; }
  #loading .dot:nth-child(3){ animation-delay:0.4s; }

  @keyframes blink{
    0%,80%,100%{ opacity:0.2; transform:scale(1); }
    40%{ opacity:1; transform:scale(1.3); }
  }

  #result{
    margin-top:28px;
    min-height:0;
    font-family:'Inter', sans-serif;
    font-size:14.5px;
    line-height:1.65;
    color:var(--cream);
    white-space:pre-wrap;
  }
  #result:not(:empty){
    background:var(--bg-panel);
    border-left:3px solid var(--clay);
    border-radius:0 6px 6px 0;
    padding:20px 22px;
    box-shadow:0 8px 24px -16px rgba(0,0,0,0.6);
    animation:markup-in 0.35s ease both;
  }
  #result:not(:empty)::before{
    content:"Markup";
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--clay);
    margin-bottom:10px;
  }

  @keyframes markup-in{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }

  @media (max-width:480px){
    .controls{ flex-direction:column; align-items:stretch; }
    button#uploadBtn{ width:100%; }
  }
</style>
</head>
<body>

  <header>
    <div class="eyebrow">Slide Review Desk</div>
    <h1>Project Invent AI
    </h1>
    <p>Drop in a deck as a PDF, PPTX, or slide image. You'll get honest notes on clarity, design, and messaging.</p>
  </header>

  <main>
    <label class="slide-frame" id="dropZone" for="fileInput">
      <div class="corner-stamp">REVIEW<br>PENDING</div>
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="13" rx="1.5"/>
        <path d="M3 14l4.5-4.5a1.5 1.5 0 0 1 2.1 0L14 14"/>
        <path d="M13 12l1.9-1.9a1.5 1.5 0 0 1 2.1 0L21 14"/>
        <circle cx="8" cy="8" r="1.3"/>
        <path d="M8 20h8"/>
      </svg>
      <p class="primary-copy" id="primaryCopy">Drop your slides here</p>
      <p class="secondary-copy" id="secondaryCopy">or click to browse your files</p>
      <div class="filetypes">
        <span>.pdf</span>
        <span>.pptx</span>
        <span>.png / .jpg</span>
      </div>
    </label>
    <input type="file" id="fileInput" accept=".pdf,.pptx,.png,.jpg,.jpeg">

    <div class="controls">
      <span class="file-status" id="fileStatus">No file selected yet</span>
      <button id="uploadBtn">Evaluate</button>
    </div>

    <div id="loading"><span>Claude is thinking</span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div id="result"></div>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const fileStatus = document.getElementById('fileStatus');
    const secondaryCopy = document.getElementById('secondaryCopy');

    function reflectFile(file){
      if(file){
        fileStatus.textContent = file.name;
        secondaryCopy.innerHTML = 'Selected: <span class="filename">' + file.name + '</span>';
      } else {
        fileStatus.textContent = 'No file selected yet';
        secondaryCopy.textContent = 'or click to browse your files';
      }
    }

    fileInput.addEventListener('change', () => reflectFile(fileInput.files[0]));

    ['dragenter','dragover'].forEach(evt =>
      dropZone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-active');
      })
    );
    ['dragleave','drop'].forEach(evt =>
      dropZone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-active');
      })
    );
    dropZone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if(file){
        fileInput.files = e.dataTransfer.files;
        reflectFile(file);
      }
    });
  </script>

  <script src="script.js"></script>
</body>
</html>
