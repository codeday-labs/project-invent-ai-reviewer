<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Invent AI Reviewer</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1d4ed8);
        color: #f8fafc;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        background: rgba(15, 23, 42, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.35);
        backdrop-filter: blur(18px);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }
      p {
        margin: 0 0 18px;
        color: #cbd5e1;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }
      input[type="file"] {
        flex: 1;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        font-weight: 600;
        cursor: pointer;
        background: #38bdf8;
        color: #082f49;
      }
      button:hover {
        filter: brightness(1.05);
      }
      .status {
        margin-top: 16px;
        color: #bae6fd;
        min-height: 24px;
      }
      pre {
        margin-top: 16px;
        padding: 16px;
        border-radius: 16px;
        background: rgba(2, 6, 23, 0.55);
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .meta {
        color: #94a3b8;
        font-size: 0.95rem;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Project Invent AI Reviewer</h1>
      <p>Upload a document and click Evaluate to get a lightweight review summary.</p>
      <div class="controls">
        <input id="fileInput" type="file" />
        <button id="evaluateButton" type="button">Evaluate</button>
      </div>
      <div class="status" id="status">Choose a file to begin.</div>
      <div class="meta" id="meta"></div>
      <pre id="result">No evaluation yet.</pre>
    </main>

    <script>
      const fileInput = document.getElementById("fileInput");
      const evaluateButton = document.getElementById("evaluateButton");
      const statusEl = document.getElementById("status");
      const metaEl = document.getElementById("meta");
      const resultEl = document.getElementById("result");

      const endpoint = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
        ? "/api/review"
        : "https://codeday-labs.github.io/project-invent-ai-reviewer/api/review.json";

      async function readFile(file) {
        if (!file) {
          throw new Error("Please choose a file first.");
        }
        const text = await file.text();
        return {
          fileName: file.name,
          size: file.size,
          content: text,
        };
      }

      evaluateButton.addEventListener("click", async () => {
        try {
          statusEl.textContent = "Reading file...";
          const payload = await readFile(fileInput.files[0]);
          metaEl.textContent = `File: ${payload.fileName} • ${payload.size} bytes`;
          statusEl.textContent = "Evaluating...";

          const url = new URL(endpoint);
          url.searchParams.set("fileName", payload.fileName);
          url.searchParams.set("size", String(payload.size));

          const response = await fetch(url, {
            method: "GET",
            headers: { Accept: "application/json" },
          });

          if (!response.ok) {
            throw new Error(`Request failed with ${response.status}`);
          }

          const data = await response.json();
          resultEl.textContent = JSON.stringify(data, null, 2);
          statusEl.textContent = data.mock ? "Received a mock review response." : "Evaluation complete.";
        } catch (error) {
          resultEl.textContent = `Error: ${error.message}`;
          statusEl.textContent = "Evaluation failed.";
        }
      });
    </script>
  </body>
</html>
